# graph/config.yaml — read by build_graph() at startup. Restart `langgraph dev`
# to pick up changes. Glob patterns supported in node_overrides keys (fnmatch).

backend_preference: ["claude", "codex"]

concurrency:
  claude: 2
  codex: 2
  gemini: 3

defaults:
  timeout_s: 120

node_overrides:
  p3_pre_scan:
    tier: cheap
    backend_preference: ["claude", "codex"]
    timeout_s: 90
    # Real-CLI smoke test (Task 18) routes through Haiku for minimal subscription
    # spend. Remove or change to a Sonnet/Opus ID for production use.
    model: claude-haiku-4-5-20251001
  p3_strategy:
    tier: smart
    backend_preference: ["claude"]
    timeout_s: 300
    # Opus 4.7 on full pre_scan context exceeds the global 120s default; aligned
    # with sibling smart-tier creative nodes (edl_select 240, plan 240,
    # prompt_expansion 300). Discovered in HOM-154 first clean E2E — Haiku-pinned
    # smoke (per LLM-node DoD) hid this until production tier=smart resolution.
    # Folded into HOM-157 PR — that fix makes future config bumps invalidate
    # the cache automatically, so this is the last bump that needed a manual
    # graph/.cache/langgraph.db wipe.
  p3_edl_select:
    tier: smart
    backend_preference: ["claude"]
    timeout_s: 600
    # Production default: Sonnet 4.6. EDL is the highest-stakes numeric step
    # (HR 6/7 word-boundary + 30–200ms padding across all cuts); Haiku-4.5
    # empirically fails the padding window, and Opus 4.7 (the default
    # tier:smart resolution in claude.py) timed out at 180s in HOM-107
    # smoke. Sonnet 4.6 hits the precision/latency sweet spot. Smoke
    # scripts pin Haiku locally via per-run override, not here.
    # 240→360→600 in HOM-154: two consecutive E2E runs on slug
    # 2026-05-06-who-else-is-tired-of-endless-monthly hit walltime 240.141s
    # then 360.079s — exactly at each prior limit. Sonnet 4.6 + Read-tool
    # iteration over a 4272-line Scribe raw.json + word-boundary HR 6/7
    # math is genuinely long. HOM-157 cfg-fingerprint invalidates cache
    # automatically. If 600s also fails, switch to Opus 4.7 or pre-trim
    # transcript inputs in the brief.
    model: claude-sonnet-4-6
  p3_self_eval:
    tier: cheap
    backend_preference: ["claude", "codex"]
    timeout_s: 180
    # Real-CLI smoke (HOM-104) routes through Haiku for minimal subscription
    # spend. Switch to a Sonnet ID for production use.
    model: claude-haiku-4-5-20251001
  p3_persist_session:
    tier: cheap
    backend_preference: ["claude", "codex"]
    timeout_s: 120
    # Real-CLI smoke (HOM-105) routes through Haiku for minimal subscription
    # spend. Switch to a Sonnet ID for production use.
    model: claude-haiku-4-5-20251001
  p4_persist_session:
    tier: cheap
    backend_preference: ["claude", "codex"]
    timeout_s: 120
    # Mechanical structured-write — sole Phase 4 LLM node that legitimately
    # stays cheap (per memory `feedback_creative_nodes_flagship_tier`
    # exception list). Real-CLI smoke (HOM-126) routes through Haiku.
    model: claude-haiku-4-5-20251001
  p4_design_system:
    tier: smart
    backend_preference: ["claude"]
    timeout_s: 240
    # Visual identity is creative — palette, typography, references,
    # alternatives, anti-patterns. tier=smart resolves to Opus 4.7 in
    # backends/claude.py. See memory `feedback_creative_nodes_flagship_tier`
    # and HOM-118 for rationale (cheap models hollow out brand-defining
    # creative work).
  p4_prompt_expansion:
    tier: smart
    backend_preference: ["claude"]
    timeout_s: 600
    # Per canon `references/prompt-expansion.md`: "the quality gap between a
    # single-pass composition and a multi-scene-pipeline composition comes
    # from this step." Highest-leverage creative node in Phase 4. tier=smart
    # resolves to Opus 4.7 in backends/claude.py. See memory
    # `feedback_creative_nodes_flagship_tier` and HOM-119.
    # 300→600 in HOM-154: first clean E2E hit walltime ~300s exactly at the
    # prior limit. Multi-scene expansion is genuinely long on Opus 4.7;
    # aligned with the EDL bump precedent in this same run.
  p4_plan:
    tier: smart
    backend_preference: ["claude"]
    timeout_s: 240
    # Plan determines pacing, energy peaks, scene rhythm, per-boundary
    # transition mechanism — creative direction, not mechanical translation.
    # Spec §6.3 originally `cheap`; HOM-120 amends to `smart` (memory
    # `feedback_creative_nodes_flagship_tier`).
  p4_beat:
    tier: smart
    backend_preference: ["claude"]
    timeout_s: 300
    # Per-scene Pattern A authoring (HOM-134). Real-CLI smoke (HOM-122d /
    # smoke_hom122.py) routes through Haiku for ~$0.001/beat spend. Production
    # is the smart tier (Opus 4.7) — scene composition is creative work and
    # cheap models empirically hollow it out (memory
    # `feedback_creative_nodes_flagship_tier`). Switch to a Sonnet/Opus ID for
    # production use.
    model: claude-haiku-4-5-20251001
  p4_captions_layer:
    tier: smart
    backend_preference: ["claude"]
    timeout_s: 300
    # Tone-adaptive captions (HOM-123). Spec §6.3 originally `cheap`; HOM-123
    # amends to `smart`. Canon `references/captions.md` §"Style Detection"
    # is explicitly tone-adaptive (4 dimensions × 5 tone profiles, per-word
    # emphasis decisions) — creative styling, not boilerplate. Real-CLI
    # smoke (smoke_hom123.py) routes through Haiku for ~$0.001 spend.
    # Switch to a Sonnet/Opus ID for production use (memory
    # `feedback_creative_nodes_flagship_tier`).
    model: claude-haiku-4-5-20251001
